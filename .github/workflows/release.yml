name: release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0). Blank uses pyproject.toml.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      tag: ${{ steps.decide.outputs.tag }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        env:
          EVENT: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          pkg=$(awk -F'"' '/^version = /{print $2; exit}' pyproject.toml)
          release=true
          tag_push=0
          if [ "$EVENT" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            tag="$REF_NAME"; version="${tag#v}"; tag_push=1
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION:-$pkg}"; version="${version#v}"; tag="v$version"
          else
            version="$pkg"; tag="v$version"
            old=$(git show "$BEFORE:pyproject.toml" 2>/dev/null | awk -F'"' '/^version = /{print $2; exit}' || echo "")
            if [ "$version" = "$old" ]; then
              echo "version unchanged ($version), no release"; release=false
            fi
          fi
          # Same sanity + existing-tag guard on every path so a stray tag or a
          # bogus dispatch input can never publish a drifting version.
          if [ "$release" = "true" ]; then
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::version '$version' is not semver X.Y.Z"; release=false
            elif [ "$version" != "$pkg" ]; then
              echo "::error::version '$version' does not match pyproject.toml ($pkg)"; release=false
            elif [ "$tag_push" = "0" ] && git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "::warning::tag $tag already exists, skipping release"; release=false
            else
              echo "releasing $tag"
            fi
          fi
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog notes
        id: notes
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail
          notes=$(awk -v ver="$VERSION" '
            $1 == "##" && $2 == ver { f = 1; next }
            f && /^## / { exit }
            f { print }
          ' CHANGELOG.md)
          notes=$(printf '%s\n' "$notes" | awk 'NF {f=1} f' | tac | awk 'NF {f=1} f' | tac)
          [ -n "$notes" ] || notes="Release $VERSION"
          printf '%s\n' "$notes" > notes.md
          echo "----- release notes -----"; cat notes.md

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/slipgate:${{ needs.check.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/slipgate:latest

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: Slipgate ${{ needs.check.outputs.tag }}
          body_path: notes.md
          draft: false
          prerelease: false
          make_latest: true
